name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        brew install ldid
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Download iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        curl -L https://github.com/growtopiajaw/iPhoneOS-SDK/releases/download/v1.0/iPhoneOS14.5.sdk.zip -o ~/theos/sdks/iPhoneOS14.5.sdk.zip
        unzip -q ~/theos/sdks/iPhoneOS14.5.sdk.zip -d ~/theos/sdks/
        rm ~/theos/sdks/iPhoneOS14.5.sdk.zip

    - name: Compile Tweak
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1

    - name: Upload Compiled File
      uses: actions/upload-artifact@v4
      with:
        name: LqFPS-Compiled
        path: packages/*.deb
